name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Build Release App
        run: bash build-maestri.sh

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name }}"
          STAGING="build/dmg-staging"
          mkdir -p "$STAGING"
          cp -R build/open-maestri.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "open-maestri $VERSION" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "build/open-maestri-$VERSION.dmg"
          rm -rf "$STAGING"

      - name: Zip App Bundle
        run: |
          cd build
          ditto -c -k --keepParent \
            open-maestri.app \
            "open-maestri-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: open-maestri ${{ github.ref_name }}
          files: |
            build/open-maestri-${{ github.ref_name }}.dmg
            build/open-maestri-${{ github.ref_name }}.zip
          generate_release_notes: true
