name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Build Release App
        run: bash scripts/build-maestri.sh

      - name: Create DMG
        run: bash scripts/create-dmg.sh

      - name: Zip App Bundle
        run: |
          cd build
          ditto -c -k --keepParent \
            open-maestri.app \
            "open-maestri-${{ github.ref_name }}.zip"

      - name: Generate Release Notes
        id: release_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          fi

          BODY=$(cat <<'RELEASE_BODY'
          ## What's Changed

          $CHANGES_PLACEHOLDER

          ## Installation

          Download **Open.Maestri.dmg**, open it, and drag **Open Maestri** to Applications.

          **First launch:** right-click the app → Open (macOS Gatekeeper will warn about unsigned apps).

          Alternatively, run in Terminal:
          ```
          xattr -cr /Applications/open-maestri.app
          ```

          Requires macOS 14+ and Apple Silicon (M1/M2/M3/M4).

          > This is an unsigned early-access build. Code signing and notarization will be added once our Apple Developer account is approved.
          RELEASE_BODY
          )

          BODY="${BODY/\$CHANGES_PLACEHOLDER/$CHANGES}"

          {
            echo 'body<<GITHUB_RELEASE_EOF'
            echo "$BODY"
            echo 'GITHUB_RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: open-maestri ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            build/Open.Maestri.dmg
            build/open-maestri-${{ github.ref_name }}.zip