name: Release Build

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build Release App
        run: bash build-maestri.sh

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-maestri-${{ github.sha }}
          path: build/open-maestri.app
          if-no-files-found: error
          retention-days: 30
