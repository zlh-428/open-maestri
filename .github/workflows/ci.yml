name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$(xcodebuild -find_path)"

      - name: Build
        run: |
          xcodebuild \
            -scheme open-maestri \
            -destination 'platform=macOS' \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SYMROOT=$(pwd)/build \
            OBJROOT=$(pwd)/build/obj

      - name: Test
        run: |
          xcodebuild \
            -scheme open-maestri \
            -destination 'platform=macOS' \
            test \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            SYMROOT=$(pwd)/build \
            OBJROOT=$(pwd)/build/obj
